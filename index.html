<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Odin Project | Rock Paper Scissors</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <!-- StyleSheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Script -->
    <script src="script.js" defer></script>

</head>

<body>

    <!-- Header -->
    <header class="game-header">
        <h1 class="game-header__title">Rock Paper Scissors</h1>
    </header>

    <!-- Main -->
    <main class="game-board">
        <div class="game-board__container">

            <section class="game-board__instruction" aria-labelledby="instruction-title">
                <h2 class="game-board__heading" id="instruction-title">Choose Your Play</h2>
                <p class="game-board__subheading">First to Score 5 Points Wins</p>
            </section>

            <section class="scoreboard" aria-label="Scoreboard">

                <div class="scoreboard__card scoreboard__card--human">
                    <div class="scoreboard__avatar-wrapper">
                        <img class="scoreboard__avatar" src="assets/idel_score-mark.png" alt="">
                    </div>
                    <p class="scoreboard__text">Human :
                        <span id="humanScore" class="scoreboard__value">0</span>
                    </p>
                </div>

                <div class="scoreboard__card scoreboard__card--computer">
                    <div class="scoreboard__avatar-wrapper">
                        <img class="scoreboard__avatar" src="assets/idel_score-mark.png" alt="">
                    </div>
                    <p class="scoreboard__text">Computer : <span id="computerScore"
                            class="scoreboard__value">0</span>
                    </p>
                </div>
            </section>

            <div class="game-controls" role="group" aria-label="Game Options">

                <button type="button" id="rock" class="game-controls__btn game-controls__btn--rock"
                    aria-label="Choose Rock">
                    <img class="game-controls__img" src="assets/select_rock.png" alt="">
                </button>

                <button type="button" id="paper" class="game-controls__btn game-controls__btn--paper"
                    aria-label="Choose Paper">
                    <img class="game-controls__img" src="assets/select_paper.png" alt="">
                </button>

                <button type="button" id="scissors" class="game-controls__btn game-controls__btn--scissors"
                    aria-label="Choose Scissors">
                    <img class="game-controls__img" src="assets/select_scissors.png" alt="">
                </button>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="attribution">
        <small class="attribution__copyright">Copyright &copy; The Odin Project 2026</small>
        <p class="attribution__author">Designed and Developed by Vinayak Kamble</p>
    </footer>

</body>

</html>
